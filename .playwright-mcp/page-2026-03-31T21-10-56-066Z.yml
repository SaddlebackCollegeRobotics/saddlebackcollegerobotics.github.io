            - paragraph [ref=e267]: SC Robotics is looking for engineering, science, and business students to work on the 2024 rover. We are looking for exceptionally motivated and talented students of any major to join the team. We have positions open for the Drive, Chassis, Arm, Autonomy, Science, and Business Subsystems.
