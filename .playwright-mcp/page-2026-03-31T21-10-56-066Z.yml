              - heading "University Rover Challenge" [level=1] [ref=e206]
            - paragraph [ref=e211]: "The University Rover Challenge (URC) is a yearly international engineering and science competition hosted by the Mars Society. Students design and build a mars rover with a robotic arm, on-board life detection experiment, and autonomous navigation system. The competition culminates in the URC Finals, where the top teams travel to the Mars Desert Research Station near Hanksville, Utah to participate in four missions: Extreme Retrieval, Equipment Servicing, Science, and Autonomy."
          - generic [ref=e213]:
            - generic [ref=e216]:
              - heading "Extreme Retrieval" [level=2] [ref=e218]
              - paragraph [ref=e220]: Traversal of the hilly, rocky, and sandy terrain to deliver tools, materials, and minerals of interest to astronauts over a distance of up to 1 km.
            - generic [ref=e223]:
              - heading "Equipment Servicing" [level=2] [ref=e225]
              - paragraph [ref=e227]: Use of the robotic arm to load a payload into a spaceship and prepare it for launch. Tasks include flipping switches, typing on a keyboard, manipulating a joystick, and inserting a USB drive into a port.
            - generic [ref=e230]:
              - heading "Science Mission" [level=2] [ref=e232]
              - paragraph [ref=e234]: In-field analysis of soil and mineral samples to determine the presence of extant or extinct life using on-rover experiments. Science members present findings to competition judges after the analysis period.
            - generic [ref=e237]:
              - heading "Autonomy Mission" [level=2] [ref=e239]
              - paragraph [ref=e241]: Autonomous navigation of increasingly challenging terrain to reach checkpoints and travel through marked gates. Checkpoints come in the form of visible ARUCO markers or GPS coordinates.
          - generic [ref=e244]:
