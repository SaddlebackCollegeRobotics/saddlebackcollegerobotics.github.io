<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Robotics — Built to Grip</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@600;700;800;900&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: 8.5in 11in; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 8.5in;
    height: 11in;
    background: #ffffff;
    color: #0a0a0a;
    font-family: 'Roboto Mono', monospace;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .poster {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar {
    width: 100%;
    height: 10px;
    background: #c3080f;
    flex-shrink: 0;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 56px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }

  .club-logo {
    height: 44px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
  }

  .club-sub {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.3);
    text-align: right;
  }

  .svg-zone {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .svg-zone svg {
    width: 145%;
    height: 145%;
    flex-shrink: 0;
  }

  .bottom-band {
    flex-shrink: 0;
    border-top: 1px solid rgba(0,0,0,0.1);
    padding: 0 56px;
  }

  .headline {
    font-family: 'Lexend Deca', sans-serif;
    font-weight: 900;
    font-size: 96px;
    line-height: 0.88;
    text-transform: uppercase;
    letter-spacing: -3px;
    padding-top: 16px;
  }

  .headline .word-accent {
    color: #c3080f;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(0,0,0,0.1);
    margin: 16px 0 14px;
  }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 20px;
  }

  .footer-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .footer-label {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(0,0,0,0.3);
  }

  .footer-value {
    font-size: 12px;
    font-weight: 600;
    color: rgba(0,0,0,0.65);
  }

  .footer-value.accent { color: #c3080f; }

  .bottom-bar {
    width: 100%;
    height: 10px;
    background: #c3080f;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="poster">
  <div class="top-bar"></div>

  <div class="header">
    <img class="club-logo" src="../assets/sc-robotics-logo-dark-text.png" alt="SC Robotics">
    <div class="club-sub">Est. 2018</div>
  </div>

  <div class="svg-zone" id="svg-zone"></div>

  <div class="bottom-band">
    <div class="headline">
      <span class="word-accent">Grippyy!</span>
    </div>
    <div class="divider"></div>
    <div class="footer-row">
      <div class="footer-item">
        <img src="../assets/urc-logo.png" alt="University Rover Challenge" style="height:30px; width:auto; opacity:0.7;">
      </div>
      <div class="footer-item">
        <div class="footer-label">Part</div>
        <div class="footer-value">26-ARM-END_EFFECTOR</div>
      </div>
      <div class="footer-item" style="display:flex; flex-direction:row; align-items:center; gap:12px;">
        <div class="footer-label">saddlebackcollegerobotics.com</div>
        <canvas id="qr_site_poster_ee"></canvas>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>

<script>
  fetch('./EE.svg')
    .then(r => r.text())
    .then(text => {
      document.getElementById('svg-zone').innerHTML = text;
      const svg = document.querySelector('#svg-zone svg');
      svg.setAttribute('viewBox', '0 0 851.672 691.488');
    })
    .catch(function() { console.error('Failed to load EE.svg'); });
</script>

<script>
  (function() {
    var qr = qrcode(0, 'M');
    qr.addData('https://saddlebackcollegerobotics.com');
    qr.make();
    var canvas = document.getElementById('qr_site_poster_ee');
    var size = 72;
    canvas.width = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    var modules = qr.getModuleCount();
    var cell = size / modules;
    var cellSize = Math.ceil(cell);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#0a0a0a';
    for (var r = 0; r < modules; r++) {
      for (var c = 0; c < modules; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect(Math.floor(c * cell), Math.floor(r * cell), cellSize, cellSize);
        }
      }
    }
  })();
</script>
</body>
</html>
