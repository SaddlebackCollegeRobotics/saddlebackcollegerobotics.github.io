<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Robotics — Eyes on Mars (B&W)</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@600;700;800;900&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: 8.5in 11in; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 8.5in;
    height: 11in;
    background: #0a0a0a;
    color: #ffffff;
    font-family: 'Roboto Mono', monospace;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .poster {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar {
    width: 100%;
    height: 10px;
    background: #ffffff;
    flex-shrink: 0;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 56px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .club-logo {
    height: 44px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
    filter: grayscale(1) invert(1);
  }

  .club-name {
    font-family: 'Lexend Deca', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
  }

  .club-sub {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }

  .svg-zone {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px;
  }

  .svg-zone img {
    width: 120%;
    height: 120%;
    object-fit: contain;
    filter: invert(1) brightness(0.85);
  }

  .drawing-ref {
    position: absolute;
    bottom: 14px;
    right: 28px;
    text-align: right;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    line-height: 1.7;
  }

  .bottom-band {
    flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 0 56px;
  }

  .headline {
    font-family: 'Lexend Deca', sans-serif;
    font-weight: 900;
    font-size: 96px;
    line-height: 0.88;
    text-transform: uppercase;
    letter-spacing: -3px;
    color: #ffffff;
    padding-top: 16px;
  }

  .headline .word-mars {
    color: #ffffff;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.1);
    margin: 16px 0 14px;
  }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 20px;
  }

  .footer-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .footer-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.2);
  }

  .footer-value {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
  }

  .footer-value.accent { color: #ffffff; }

  .bottom-bar {
    width: 100%;
    height: 10px;
    background: #ffffff;
    flex-shrink: 0;
  }

  .qr-item canvas { display: block; }
  .qr-item .footer-label { text-align: center; margin-top: 5px; }
</style>
</head>
<body>
<div class="poster">
  <div class="top-bar"></div>

  <div class="header">
    <img class="club-logo" src="../sc-robotics-logo-dark-text.png" alt="SC Robotics">
    <div class="club-name">Saddleback College Robotics</div>
    <div class="club-sub">University Rover Challenge &nbsp;·&nbsp; Est. 2018</div>
  </div>

  <div class="svg-zone">
    <img src="./26-SCI-COL-A001-Science Collection System.svg" alt="Science Collection System">
    <div class="drawing-ref">
      26-SCI-COL-A001<br>
      Science Collection System
    </div>
  </div>

  <div class="bottom-band">
    <div class="headline">
      Eyes on<br><span class="word-mars">Mars.</span>
    </div>
    <div class="divider"></div>
    <div class="footer-row">
      <div class="footer-item">
        <div class="footer-label">Discord</div>
        <div class="footer-value accent">discord.gg/USzmfYwAUa</div>
      </div>
      <div class="footer-item">
        <div class="footer-label">Open to</div>
        <div class="footer-value">All Saddleback Students</div>
      </div>
      <div class="footer-item qr-item">
        <canvas id="qr_site_poster_science_bw"></canvas>
        <div class="footer-label">Website</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>

<script>
  (function() {
    var qr = qrcode(0, 'M');
    qr.addData('https://saddlebackcollegerobotics.com');
    qr.make();
    var canvas = document.getElementById('qr_site_poster_science_bw');
    var size = 72;
    canvas.width = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    var modules = qr.getModuleCount();
    var cell = size / modules;
    var isDark = canvas.closest
      ? (getComputedStyle(document.body).backgroundColor.includes('10, 10, 10') || getComputedStyle(document.body).backgroundColor === 'rgb(10, 10, 10)')
      : false;
    var bg = isDark ? '#0a0a0a' : '#ffffff';
    var fg = isDark ? '#ffffff' : '#0a0a0a';
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = fg;
    for (var r = 0; r < modules; r++) {
      for (var c = 0; c < modules; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect(Math.floor(c * cell), Math.floor(r * cell), Math.ceil(cell), Math.ceil(cell));
        }
      }
    }
  })();
</script>
</body>
</html>
