<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Robotics — Built to Grip (Dark)</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@600;700;800;900&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: 8.5in 11in; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 8.5in;
    height: 11in;
    background: #0a0a0a;
    color: #ffffff;
    font-family: 'Roboto Mono', monospace;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .poster {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar {
    width: 100%;
    height: 10px;
    background: #c3080f;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 56px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .club-logo {
    height: 44px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
  }

  .club-sub {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    text-align: right;
  }

  .svg-zone {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .svg-zone svg {
    width: 145%;
    height: 145%;
    flex-shrink: 0;
    filter: invert(1) brightness(0.9);
  }

  .bottom-band {
    flex-shrink: 0;
    padding: 0 56px;
    position: relative;
    z-index: 10;
  }

  .headline {
    font-family: 'Lexend Deca', sans-serif;
    font-weight: 900;
    font-size: 96px;
    line-height: 0.88;
    text-transform: uppercase;
    letter-spacing: -3px;
    padding-top: 16px;
  }

  .headline .word-accent {
    color: #c3080f;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.15);
    margin: 16px 0 14px;
  }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 20px;
  }

  .footer-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .footer-label {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.4);
  }

  .footer-value {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
  }

  .footer-value.accent { color: #c3080f; }

  .bottom-bar {
    width: 100%;
    height: 10px;
    background: #c3080f;
    flex-shrink: 0;
  }

  .qr-item canvas { display: block; }
  .qr-item .footer-label { text-align: center; margin-top: 5px; }
</style>
</head>
<body>
<div class="poster">
  <div class="top-bar"></div>

  <div class="header">
    <img class="club-logo" src="../assets/sc-robotics-logo-light-text.png" alt="SC Robotics">
    <div class="club-sub">University Rover Challenge &nbsp;·&nbsp; Est. 2018</div>
  </div>

  <div class="svg-zone" id="svg-zone"></div>

  <div class="bottom-band">
    <div class="headline">
      <span class="word-accent">Grippyy!</span>
    </div>
    <div class="divider"></div>
    <div class="footer-row">
      <div class="footer-item">
        <div class="footer-label">Discord</div>
        <div class="footer-value accent">discord.gg/USzmfYwAUa</div>
      </div>
      <div class="footer-item">
        <div class="footer-label">Part</div>
        <div class="footer-value">26-ARM-END_EFFECTOR</div>
      </div>
      <div class="footer-item qr-item">
        <canvas id="qr_site_poster_ee_dark"></canvas>
        <div class="footer-label">Website</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>

<script>
  fetch('./EE.svg')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('svg-zone').innerHTML = text;
      var svg = document.querySelector('#svg-zone svg');
      svg.setAttribute('viewBox', '0 0 851.672 691.488');
    })
    .catch(function() { console.error('Failed to load EE.svg'); });
</script>

<script>
  (function() {
    var qr = qrcode(0, 'M');
    qr.addData('https://saddlebackcollegerobotics.com');
    qr.make();
    var canvas = document.getElementById('qr_site_poster_ee_dark');
    var size = 72;
    canvas.width = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    var modules = qr.getModuleCount();
    var cell = size / modules;
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#ffffff';
    for (var r = 0; r < modules; r++) {
      for (var c = 0; c < modules; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect(Math.floor(c * cell), Math.floor(r * cell), Math.ceil(cell), Math.ceil(cell));
        }
      }
    }
  })();
</script>
</body>
</html>
