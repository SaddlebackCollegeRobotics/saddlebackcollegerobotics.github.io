<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Robotics — Reach Further (Dark)</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@600;700;800;900&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: 16in 20in; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 16in;
    height: 20in;
    background: #0a0a0a;
    color: #ffffff;
    font-family: 'Roboto Mono', monospace;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .poster {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar {
    width: 100%;
    height: 19px;
    background: #c3080f;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 41px 105px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .club-logo {
    height: 83px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
  }

  .club-sub {
    font-size: 19px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    text-align: right;
  }

  /* SVG zone */
  .svg-zone {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .svg-zone svg {
    width: 145%;
    height: 145%;
    flex-shrink: 0;
    filter: invert(1) brightness(0.9);
  }

  /* Bottom band */
  .bottom-band {
    flex-shrink: 0;
    padding: 0 105px;
    position: relative;
    z-index: 10;
  }

  .headline {
    font-family: 'Lexend Deca', sans-serif;
    font-weight: 900;
    font-size: 180px;
    line-height: 0.88;
    text-transform: uppercase;
    letter-spacing: -6px;
  }

  .headline .word-further {
    color: #c3080f;
  }

  .divider {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.15);
    margin: 38px 0 30px;
  }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 41px;
  }

  .footer-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .footer-label {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
  }

  .footer-value {
    font-size: 23px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
  }

  .footer-value.accent { color: #c3080f; }

  .bottom-bar {
    width: 100%;
    height: 19px;
    background: #c3080f;
    flex-shrink: 0;
  }

</style>
</head>
<body>
<div class="poster">
  <div class="top-bar"></div>

  <div class="header">
    <img class="club-logo" src="../../assets/sc-robotics-logo-light-text.png" alt="SC Robotics">
    <div class="club-sub">Est. 2018</div>
  </div>

  <div class="svg-zone" id="svg-zone"></div>

  <div class="bottom-band">
    <div class="headline">
      Reach<br><span class="word-further">Further.</span>
    </div>
    <div class="divider"></div>
    <div class="footer-row">
      <div class="footer-item">
        <img src="../../assets/urc-logo-dark.png" alt="University Rover Challenge" style="height:56px; width:auto;">
      </div>
      <div class="footer-item">
        <div class="footer-label">Open to</div>
        <div class="footer-value">All Saddleback &amp; IVC Students</div>
      </div>
      <div class="footer-item" style="display:flex; flex-direction:row; align-items:center; gap:23px;">
        <div class="footer-label">saddlebackcollegerobotics.com</div>
        <canvas id="qr_site_poster_arm_dark"></canvas>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>

<script>
  // Inline the SVG so we can adjust its viewBox to correct the off-center arm
  fetch('../NewArm.svg')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('svg-zone').innerHTML = text;
      var svg = document.querySelector('#svg-zone svg');
      // Original viewBox is "0 0 792 612". Shift window right by 80px
      // so the arm content appears shifted left.
      svg.setAttribute('viewBox', '120 5 726 550');
    })
    .catch(function() { console.error('Failed to load NewArm.svg'); });
</script>

<script>
  (function() {
    var qr = qrcode(0, 'M');
    qr.addData('https://saddlebackcollegerobotics.com');
    qr.make();
    var canvas = document.getElementById('qr_site_poster_arm_dark');
    var size = 135;
    canvas.width = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    var modules = qr.getModuleCount();
    var cell = size / modules;
    var cellSize = Math.ceil(cell);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#ffffff';
    for (var r = 0; r < modules; r++) {
      for (var c = 0; c < modules; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect(Math.floor(c * cell), Math.floor(r * cell), cellSize, cellSize);
        }
      }
    }
  })();
</script>
</body>
</html>
