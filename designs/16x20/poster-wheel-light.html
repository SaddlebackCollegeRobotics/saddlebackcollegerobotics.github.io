<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Robotics — Driven to Explore</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@600;700;800;900&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: 16in 20in; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 16in;
    height: 20in;
    background: #ffffff;
    color: #0a0a0a;
    font-family: 'Roboto Mono', monospace;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .poster {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar {
    width: 100%;
    height: 19px;
    background: #c3080f;
    flex-shrink: 0;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 41px 105px;
    flex-shrink: 0;
    border-bottom: 2px solid rgba(0,0,0,0.08);
  }

  .club-logo {
    height: 83px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
  }

  .club-sub {
    font-size: 19px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.3);
    text-align: right;
  }

  /* SVG fills most of the poster */
  .svg-zone {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 75px 75px;
  }

  .svg-zone img {
    width: 115%;
    height: 115%;
    object-fit: contain;
    position: relative;
    z-index: 2;
  }

  .drawing-ref {
    position: absolute;
    bottom: 26px;
    right: 53px;
    text-align: right;
    font-size: 17px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.18);
    line-height: 1.7;
  }

  /* Bottom text band */
  .bottom-band {
    flex-shrink: 0;
    border-top: 2px solid rgba(0,0,0,0.1);
    padding: 0 105px;
  }

  .headline {
    font-family: 'Lexend Deca', sans-serif;
    font-weight: 900;
    font-size: 180px;
    line-height: 0.88;
    text-transform: uppercase;
    letter-spacing: -6px;
    padding-top: 30px;
  }

  .headline .word-explore {
    color: #c3080f;
  }

  .divider {
    width: 100%;
    height: 2px;
    background: rgba(0,0,0,0.1);
    margin: 30px 0 26px;
  }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 38px;
  }

  .footer-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .footer-label {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(0,0,0,0.3);
  }

  .footer-value {
    font-size: 23px;
    font-weight: 600;
    color: rgba(0,0,0,0.65);
  }

  .footer-value.accent { color: #c3080f; }

  .bottom-bar {
    width: 100%;
    height: 19px;
    background: #c3080f;
    flex-shrink: 0;
  }

</style>
</head>
<body>
<div class="poster">
  <div class="top-bar"></div>

  <div class="header">
    <img class="club-logo" src="../../assets/sc-robotics-logo-dark-text.png" alt="SC Robotics">
    <div class="club-sub">Est. 2018</div>
  </div>

  <div class="svg-zone">
    <img src="../wheel.svg" alt="Rover Wheel">
    <div class="drawing-ref">
      26_SCR_WHEEL<br>
      Drive Wheel Assembly
    </div>
  </div>

  <div class="bottom-band">
    <div class="headline">
      Driven to<br><span class="word-explore">Explore.</span>
    </div>
    <div class="divider"></div>
    <div class="footer-row">
      <div class="footer-item">
        <img src="../../assets/urc-logo.png" alt="University Rover Challenge" style="height:56px; width:auto; opacity:0.7;">
      </div>
      <div class="footer-item">
        <div class="footer-label">Open to</div>
        <div class="footer-value">All Saddleback &amp; IVC Students</div>
      </div>
      <div class="footer-item" style="display:flex; flex-direction:row; align-items:center; gap:23px;">
        <div class="footer-label">saddlebackcollegerobotics.com</div>
        <canvas id="qr_site_poster_wheel_light"></canvas>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>

<script>
  (function() {
    var qr = qrcode(0, 'M');
    qr.addData('https://saddlebackcollegerobotics.com');
    qr.make();
    var canvas = document.getElementById('qr_site_poster_wheel_light');
    var size = 135;
    canvas.width = size;
    canvas.height = size;
    var ctx = canvas.getContext('2d');
    var modules = qr.getModuleCount();
    var cell = size / modules;
    var cellSize = Math.ceil(cell);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#0a0a0a';
    for (var r = 0; r < modules; r++) {
      for (var c = 0; c < modules; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect(Math.floor(c * cell), Math.floor(r * cell), cellSize, cellSize);
        }
      }
    }
  })();
</script>
</body>
</html>
